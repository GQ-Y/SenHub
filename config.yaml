# 海康威视NVR录像机控制服务配置文件

# MQTT配置
mqtt:
  broker: "tcp://localhost:1883"  # MQTT服务器地址
  client_id: "hikvision-nvr-control"  # 客户端ID
  username: ""  # MQTT用户名（可选）
  password: ""  # MQTT密码（可选）
  status_topic: "hikvision/status"  # 状态上报主题
  command_topic: "hikvision/command"  # 命令接收主题
  response_topic: "hikvision/response"  # 命令响应主题
  qos: 1  # 消息质量等级 (0, 1, 2)
  keep_alive: 60  # 保活时间（秒）

# 设备扫描配置
scanner:
  enabled: true  # 是否启用自动扫描
  interval: 300  # 扫描间隔（秒）
  listen_port: 7200  # 监听端口
  listen_ip: "0.0.0.0"  # 监听IP地址

# 设备认证配置
device:
  default_username: "admin"  # 默认用户名
  default_password: ""  # 默认密码（如果为空，需要手动配置）
  default_port: 8000  # 默认端口
  login_timeout: 5  # 登录超时时间（秒）
  reconnect_interval: 30  # 重连间隔（秒）

# 保活系统配置
keeper:
  enabled: true  # 是否启用保活系统
  check_interval: 60  # 检查间隔（秒）
  offline_threshold: 3  # 离线判定阈值（连续失败次数）

# OSS配置（用于录像上传）
oss:
  enabled: false  # 是否启用OSS上传
  endpoint: ""  # OSS端点
  access_key_id: ""  # AccessKey ID
  access_key_secret: ""  # AccessKey Secret
  bucket_name: ""  # 存储桶名称
  region: ""  # 区域

# 数据库配置
database:
  path: "./data/devices.db"  # SQLite数据库路径

# 日志配置
log:
  level: "info"  # 日志级别: debug, info, warn, error
  file: "./logs/app.log"  # 日志文件路径
  max_size: 100  # 日志文件最大大小（MB）
  max_backups: 7  # 保留的日志文件数量
  max_age: 30  # 日志文件保留天数
