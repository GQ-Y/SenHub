<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001122;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001122;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044CC;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <g opacity="0.1">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#0066FF" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#0066FF" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#0066FF" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="600" stroke="#0066FF" stroke-width="1"/>
  </g>
  
  <g transform="translate(100, 50)">
    <circle cx="150" cy="150" r="120" fill="url(#logoGradient)" opacity="0.2"/>
    <polygon points="150,60 210,90 240,150 210,210 150,240 90,210 60,150 90,90" 
             fill="url(#logoGradient)" 
             stroke="#0066FF" 
             stroke-width="3"
             filter="url(#glow)"/>
    <circle cx="150" cy="150" r="35" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="150" cy="150" r="25" fill="url(#logoGradient)"/>
    <rect x="140" y="135" width="20" height="15" rx="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="150" cy="142" r="5" fill="#0066FF"/>
  </g>
  
  <g transform="translate(350, 120)">
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">
      SenHub
    </text>
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="32" fill="#00AAFF" opacity="0.9">
      多品牌视频监控报警统一中枢
    </text>
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="24" fill="#CCCCCC" opacity="0.8">
      一平台纳管全品牌，一事件触发全智能
    </text>
  </g>
  
  <g transform="translate(900, 100)" opacity="0.3">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="80" height="60" rx="5" fill="none" stroke="#0066FF" stroke-width="2"/>
      <circle cx="40" cy="30" r="15" fill="none" stroke="#0066FF" stroke-width="2"/>
      <circle cx="40" cy="30" r="8" fill="#0066FF"/>
    </g>
    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="80" height="60" rx="5" fill="none" stroke="#00AAFF" stroke-width="2"/>
      <circle cx="40" cy="30" r="15" fill="none" stroke="#00AAFF" stroke-width="2"/>
      <circle cx="40" cy="30" r="8" fill="#00AAFF"/>
    </g>
    <g transform="translate(60, 120)">
      <rect x="0" y="0" width="80" height="60" rx="5" fill="none" stroke="#0066FF" stroke-width="2"/>
      <circle cx="40" cy="30" r="15" fill="none" stroke="#0066FF" stroke-width="2"/>
      <circle cx="40" cy="30" r="8" fill="#0066FF"/>
    </g>
  </g>
  
  <g transform="translate(350, 450)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#0066FF" opacity="0.8"/>
    <text x="60" y="28" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
      多品牌统一
    </text>
    
    <rect x="140" y="0" width="120" height="40" rx="20" fill="#00AAFF" opacity="0.8"/>
    <text x="200" y="28" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
      实时监控
    </text>
    
    <rect x="280" y="0" width="120" height="40" rx="20" fill="#0066FF" opacity="0.8"/>
    <text x="340" y="28" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
      AI 驱动
    </text>
    
    <rect x="420" y="0" width="120" height="40" rx="20" fill="#00AAFF" opacity="0.8"/>
    <text x="480" y="28" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
      开放协议
    </text>
  </g>
  
  <g stroke="#0066FF" stroke-width="2" opacity="0.2" fill="none">
    <path d="M 350 300 Q 500 250 650 300"/>
    <path d="M 350 350 Q 500 400 650 350"/>
  </g>
</svg>
