version: '3.8'

services:
  video-gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-gateway-service:latest
    container_name: video-gateway-service
    platform: linux/arm64
    ports:
      - "8080:8080"  # HTTP API端口映射，允许外部访问
    # 注意：使用端口映射后，容器内访问局域网设备需要使用宿主机IP或bridge网络
    volumes:
      # 挂载整个server目录（代码修改立即生效）
      - .:/app
      # 挂载SDK库文件目录
      - ../sdk:/app/../sdk:ro
      # 挂载Maven仓库（持久化，加速后续构建）
      - maven-repo:/root/.m2
      # 持久化数据目录
      - ./data:/app/data
      - ./logs:/app/logs
      - ./sdkLog:/app/sdkLog
      - ./storage:/app/storage
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
      - MAVEN_HOME=/opt/maven
      - LD_LIBRARY_PATH=/app/lib:/app/lib/hikvision:/app/lib/hikvision/HCNetSDKCom:/app/lib/tiandy:/app/lib/dahua
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  maven-repo:
