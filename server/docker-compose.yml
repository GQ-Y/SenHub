version: '3.8'

services:
  nvr-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: hikvision-nvr-service:latest
    container_name: hikvision-nvr-service
    platform: linux/arm64
    network_mode: host  # 使用host网络模式，方便访问局域网设备和MQTT服务器
    volumes:
      # 挂载整个server目录（代码修改立即生效）
      - .:/app
      # 挂载SDK库文件目录
      - ../sdk:/app/../sdk:ro
      # 挂载Maven仓库（持久化，加速后续构建）
      - maven-repo:/root/.m2
      # 持久化数据目录
      - ./data:/app/data
      - ./logs:/app/logs
      - ./sdkLog:/app/sdkLog
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
      - MAVEN_HOME=/opt/maven
      - LD_LIBRARY_PATH=/app/lib:/app/../sdk/HCNetSDKV6.1.9.45_build20220902_ArmLinux64_ZH/MakeAll:/app/../sdk/HCNetSDKV6.1.9.45_build20220902_ArmLinux64_ZH/MakeAll/HCNetSDKCom
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  maven-repo:
