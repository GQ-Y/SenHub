# 海康威视NVR录像机控制服务配置文件

# MQTT配置
mqtt:
  broker: "tcp://mqtt.yingzhu.net:1883"  # MQTT服务器地址
  client_id: "hikvision-nvr-control"  # 客户端ID
  username: "demos1"  # MQTT用户名
  password: "demos1"  # MQTT密码
  status_topic: "hikvision/status"  # 状态上报主题
  command_topic: "hikvision/command"  # 命令接收主题
  response_topic: "hikvision/response"  # 命令响应主题
  qos: 1  # 消息质量等级 (0, 1, 2)
  keep_alive: 60  # 保活时间（秒）

# 设备扫描配置
scanner:
  enabled: true  # 是否启用自动扫描
  interval: 300  # 扫描间隔（秒）
  listen_port: 7200  # 监听端口
  listen_ip: "0.0.0.0"  # 监听IP地址
  scan_range_start: 10  # 扫描IP范围起始值（例如：192.168.1.10）
  scan_range_end: 100  # 扫描IP范围结束值（例如：192.168.1.100）

# 设备认证配置
device:
  default_username: "admin"  # 默认用户名
  default_password: "hk12345678"  # 默认密码
  default_port: 8000  # SDK默认端口（用于SDK协议通信）
  http_port: 80  # HTTP端口（用于Web访问、抓图等）
  rtsp_port: 554  # RTSP端口（用于视频流）
  login_timeout: 5  # 登录超时时间（秒）
  reconnect_interval: 30  # 重连间隔（秒）

# 保活系统配置
keeper:
  enabled: true  # 是否启用保活系统
  check_interval: 60  # 检查间隔（秒）
  offline_threshold: 3  # 离线判定阈值（连续失败次数）

# OSS配置（用于录像上传）
oss:
  enabled: false  # 是否启用OSS上传
  endpoint: ""  # OSS端点
  access_key_id: ""  # AccessKey ID
  access_key_secret: ""  # AccessKey Secret
  bucket_name: ""  # 存储桶名称
  region: ""  # 区域

# 数据库配置
database:
  path: "./data/devices.db"  # SQLite数据库路径

# 日志配置
log:
  level: "info"  # 日志级别: debug, info, warn, error
  file: "./logs/app.log"  # 日志文件路径
  max_size: 100  # 日志文件最大大小（MB）
  max_backups: 7  # 保留的日志文件数量
  max_age: 30  # 日志文件保留天数

# SDK配置（支持多品牌：海康、天地伟业、大华）
# 所有品牌SDK共享此配置，库文件路径会自动识别
sdk:
  lib_path: "./lib/hikvision"  # 海康SDK库文件路径
  log_path: "./sdkLog"  # SDK日志路径
  log_level: 3  # SDK日志级别
  # 注意：海康SDK库文件在 ./lib/hikvision/
  # 注意：天地伟业SDK库文件在 ./lib/tiandy/
  # 注意：大华SDK库文件在 ./lib/dahua/

# 录制配置
recorder:
  enabled: true  # 是否启用自动录制
  record_path: "./records"  # 录制文件存储路径
  retention_minutes: 10  # 录制文件保留时长（分钟），超过此时间的文件将被自动删除
