# SenHub 视频网关配置文件

# HTTP 服务器配置
server:
  port: 8084  # HTTP 监听端口

# MQTT配置（senhub 主题规范）
mqtt:
  broker: ""  # MQTT服务器地址，例如: tcp://192.168.1.100:1883
  client_id: "senhub-app"  # 客户端ID前缀，运行时自动拼接本机 MAC 地址以保证唯一性（如 senhub-app-5254001122AA）
  username: ""  # MQTT用户名
  password: ""  # MQTT密码
  status_topic: "senhub/device/status"  # 设备/雷达状态上报主题
  command_topic: "senhub/command"  # 命令接收主题
  response_topic: "senhub/response"  # 命令响应主题
  gateway_status_topic: "senhub/gateway/status"  # 网关上下线/故障主题（LWT）
  report_topic_prefix: "senhub/report"  # 报警/工作流上报主题前缀，实际为 senhub/report/{deviceId}
  qos: 1  # 消息质量等级 (0, 1, 2)
  keep_alive: 60  # 保活时间（秒）

# 设备扫描配置
scanner:
  enabled: false  # 是否启用自动扫描
  interval: 300  # 扫描间隔（秒）
  listen_port: 7200  # 监听端口
  listen_ip: "0.0.0.0"  # 监听IP地址
  scan_range_start: 10  # 扫描IP范围起始值（例如：192.168.1.10）
  scan_range_end: 100  # 扫描IP范围结束值（例如：192.168.1.100）
  scan_segment: "192.168.1"  # 扫描网段（避开Docker虚拟网段）

# 设备认证配置
device:
  default_username: "admin"  # 默认用户名
  default_password: "hk12345678"  # 默认密码
  default_port: 8000  # SDK默认端口（用于SDK协议通信）
  http_port: 80  # HTTP端口（用于Web访问、抓图等）
  rtsp_port: 554  # RTSP端口（用于视频流）
  login_timeout: 5  # 登录超时时间（秒）
  reconnect_interval: 30  # 重连间隔（秒）
  # 品牌预设配置
  hikvision:
    port: 8000
    username: "admin"
    password: ""
  tiandy:
    port: 8000
    username: "Admin"
    password: ""
  dahua:
    port: 37777
    username: "admin"
    password: ""

# 保活系统配置
keeper:
  enabled: true  # 是否启用保活系统
  check_interval: 60  # 检查间隔（秒）
  offline_threshold: 3  # 离线判定阈值（连续失败次数）

# OSS配置 - 注意：实际配置从数据库读取，此处仅为默认值
# 请通过系统设置界面或API配置OSS参数
oss:
  enabled: false  # 默认禁用，从数据库配置启用
  type: ""        # 从数据库读取: aliyun|minio|custom
  endpoint: ""    # 从数据库读取
  access_key_id: ""
  access_key_secret: ""
  bucket_name: ""
  region: ""
  form_data_upload_path: "/upload/file_upload/formDataUpload"  # 自定义OSS表单上传路径
  base64_upload_path: "/upload/file_upload/imgUpload"          # 自定义OSS Base64上传路径

# 数据库配置
database:
  path: "./data/devices.db"  # SQLite数据库路径

# 日志配置
log:
  level: "info"  # 日志级别: debug, info, warn, error
  file: "./logs/app.log"  # 日志文件路径
  max_size: 100  # 日志文件最大大小（MB）
  max_backups: 7  # 保留的日志文件数量
  max_age: 30  # 日志文件保留天数
  debug_mode: false  # 调试模式，开启后更多设备日志输出到SDK日志
  sdk_log_file: "./logs/sdk.log"  # SDK调用日志文件
  pointcloud_log_interval: 60  # 雷达点云日志打印间隔（秒）

# SDK配置（支持多品牌：海康、天地伟业、大华）
# 所有品牌SDK共享此配置，库文件路径会根据系统架构自动识别
sdk:
  lib_path: "./lib"  # SDK库文件基础路径（会根据架构自动选择arm或x86子目录）
  log_path: "./sdkLog"  # SDK日志路径
  log_level: 3  # SDK日志级别
  # 目录结构：
  #   lib/
  #     arm/
  #       hikvision/    (海康ARM库)
  #       dahua/        (大华ARM库)
  #     x86/
  #       hikvision/    (海康x86库)
  #       tiandy/       (天地伟业x86库，仅x86)
  #       dahua/        (大华x86库)

# 录制配置
recorder:
  enabled: true  # 是否启用自动录制
  record_path: "./storage/records"  # 录制文件存储路径
  retention_minutes: 10  # 录制文件保留时长（分钟），超过此时间的文件将被自动删除

# PTZ监控配置
# 定时获取球机PTZ位置信息，用于实时监控和联动
ptz_monitor:
  enabled: true  # 是否启用PTZ监控服务
  interval: 5000  # 轮询间隔（毫秒），建议5000-10000

# 消息通知配置 - 注意：实际配置从数据库读取，此处仅为默认值
# 请通过系统设置界面或API配置通知参数
notification:
  # 企业微信 - 从数据库读取配置
  wechat:
    enabled: false
    webhook_url: ""
  # 钉钉 - 从数据库读取配置
  dingtalk:
    enabled: false
    webhook_url: ""
    secret: ""
  # 飞书 - 从数据库读取配置
  feishu:
    enabled: false
    webhook_url: ""

# ZLMediaKit 内嵌服务（直播拉流、回放转码等）
# 默认启用；未读取到配置文件时也会按默认配置启动 ZLM
# 需部署 FFmpeg 以供回放转码使用
zlm:
  enabled: true
  http_port: 7788
  rtsp_port: 5540
  rtmp_port: 19350
  media_server_id: "SenHubZLM"
  api_secret: "035c73f7-bb6b-4889-a715-d9eb2d1925cc"
