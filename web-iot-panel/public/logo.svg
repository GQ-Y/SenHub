<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00AAFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Central hub - hexagon -->
  <polygon points="256,120 336,160 376,240 336,320 256,360 176,320 136,240 176,160" 
           fill="url(#gradient1)" 
           stroke="#0066FF" 
           stroke-width="4"
           filter="url(#glow)"/>
  
  <!-- Central circle (core) -->
  <circle cx="256" cy="240" r="45" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="256" cy="240" r="35" fill="url(#gradient2)"/>
  
  <!-- Camera icon (center) -->
  <rect x="241" y="220" width="30" height="20" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="256" cy="230" r="8" fill="#0066FF"/>
  <rect x="246" y="240" width="20" height="8" rx="1" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Surrounding device nodes (representing multi-brand devices) -->
  <!-- Top left -->
  <circle cx="120" cy="120" r="20" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="140" y1="140" x2="200" y2="180" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="120" cy="120" r="8" fill="#FFFFFF"/>
  
  <!-- Top right -->
  <circle cx="392" cy="120" r="20" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="372" y1="140" x2="312" y2="180" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="392" cy="120" r="8" fill="#FFFFFF"/>
  
  <!-- Bottom right -->
  <circle cx="392" cy="392" r="20" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="372" y1="372" x2="312" y2="332" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="392" cy="392" r="8" fill="#FFFFFF"/>
  
  <!-- Bottom left -->
  <circle cx="120" cy="392" r="20" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="140" y1="372" x2="200" y2="332" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="120" cy="392" r="8" fill="#FFFFFF"/>
  
  <!-- Top -->
  <circle cx="256" cy="60" r="18" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="256" y1="78" x2="256" y2="160" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="60" r="7" fill="#FFFFFF"/>
  
  <!-- Bottom -->
  <circle cx="256" cy="452" r="18" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="256" y1="434" x2="256" y2="360" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="452" r="7" fill="#FFFFFF"/>
  
  <!-- Left -->
  <circle cx="60" cy="256" r="18" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="78" y1="256" x2="160" y2="256" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="60" cy="256" r="7" fill="#FFFFFF"/>
  
  <!-- Right -->
  <circle cx="452" cy="256" r="18" fill="url(#gradient2)" opacity="0.8"/>
  <line x1="434" y1="256" x2="360" y2="256" stroke="#0066FF" stroke-width="2" opacity="0.5"/>
  <circle cx="452" cy="256" r="7" fill="#FFFFFF"/>
</svg>
